[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.pri}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-padding = 1
label-empty = %name%
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow

[module/date]
type = internal/date
date = %m-%d-%Y
time = %I:%M %p
label = " %time% %date%"

[module/tray]
type = internal/tray
format-margin = 8pt
tray-spacing = 5pt

[module/pulseaudio]
type = internal/pulseaudio
label-volume = Vol %percentage%%
label-muted = Muted
format-volume = <label-volume>
click-right = pavucontrol
